{% extends "base.html" %}
{% block title %}{{ page.title }} &ndash; {{ project }}{% endblock title %}
{% block body %}
  <div class="row">
    <h1>{{ page.title }}</h1>
    <div class="row">
      <div class="col-lg-12">
        <div class="card" style="min-height: 40px;">
          <ul class="list-inline" style="margin-bottom:0px; display:inline">
             {% if page.author %}
               <li><i class="fa fa-pencil"></i> {{ page.author }}</li>
             {% endif %}
             {% if page.date %}
               <li><i class="fa fa-calendar-o"></i> {{ page.date }}</li>
              {% endif %}

        </div>
      </div>
    </div>
  </div>

  <!-- https://afeld.github.io/bootstrap-toc/ -->
  <div class="container">
    <div class="row">
    <!-- sidebar, which will move to the top on a small screen -->
      <div class="col-sm-3">
        <nav id="toc" data-toggle="toc" class="sticky-top"></nav>
      </div>

      <!-- main content area -->
      <div class="col-md-9 col-md-push-3" id='text'>
        {{ page.contents }}
      </div>

    </div>
  </div>

{% endblock body %}
